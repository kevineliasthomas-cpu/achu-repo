name: Terraform Atlas Cluster Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VAR_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
  TF_VAR_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
  TF_VAR_project_id: ${{ secrets.MONGODB_ATLAS_ORG_ID }}
  TF_VAR_project_name: ${{ secrets.MONGODB_PROJECT_NAME }}
  TF_VAR_db_username: ${{ secrets.MONGODB_DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.MONGODB_DB_PASSWORD }}
  TF_VAR_access_list_ip: ${{ secrets.MONGODB_ACCESS_LIST_IP }}
  TF_VAR_cluster_name: ${{ secrets.MONGODB_CLUSTER_NAME }}
  TF_VAR_provider_region_name: ${{ secrets.MONGODB_PROVIDER_REGION }}
  TF_VAR_provider_instance_size_name: ${{ secrets.MONGODB_INSTANCE_SIZE }}
  TF_VAR_mongo_db_major_version: ${{ secrets.MONGODB_VERSION }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        id: plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        id: apply

      - name: Output Atlas Cluster Details
        if: success()
        run: terraform output
